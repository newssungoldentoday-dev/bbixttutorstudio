<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Create Lesson Plan — BlueBixt</title>
  <link rel="stylesheet" href="style.css">
  <script defer src="script.js"></script>
</head>
<body>
  <main>
    <h2>Create Lesson Plan</h2>
    <form id="plan-form">
      <div class="form-row">
        <div>
          <label>Lesson Title
            <input name="lesson_title" type="text" required>
          </label>
        </div>
        <div>
          <label>Grade
            <input name="grade" type="text">
          </label>
        </div>
      </div>

      <label>Objectives
        <textarea name="objectives" placeholder="List objectives, separated by semicolons"></textarea>
      </label>

      <label>Materials
        <textarea name="materials" placeholder="List materials, separated by commas"></textarea>
      </label>

      <label>Activities
        <textarea name="activities" placeholder="Step-by-step activities"></textarea>
      </label>

      <label>Assessment
        <textarea name="assessment" placeholder="How will you assess learning?"></textarea>
      </label>

      <div style="margin-top:12px">
        <button class="btn" type="submit">Save Lesson Plan</button>
        <a href="index.html" class="btn" style="background:#94a3b8">Cancel</a>
      </div>
    </form>
  </main>
</body>
</html>
